services:
  # 1. Auth Service
  - type: web
    name: ims-auth-service
    env: docker
    plan: free
    rootDir: auth-service
    envVars:
      - key: DB_URL
        value: jdbc:mysql://mysql-d202fff-anshmishra75436-75cc.g.aivencloud.com:13114/inventory_auth_db?ssl-mode=REQUIRED
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false # You will enter this in Render Dashboard
      - key: RABBITMQ_HOST
        sync: false
      - key: RABBITMQ_USERNAME
        sync: false
      - key: RABBITMQ_PASSWORD
        sync: false

